# Playlist registry — one entry per line.
# Format: <name> <spotify-url>
#   name        slug used as the .spotdl filename, beets source tag, and .m3u filename.
#               Use lowercase letters, numbers, and hyphens only.
#   spotify-url full Spotify playlist URL (not a secret — safe to commit)
#
# Add a line here for every playlist you want the pipeline to track.
# Run `music-provision` (or `music-setup --name <name> --url <url>`) to create
# the corresponding .spotdl file on the PVC. Existing .spotdl files are not overwritten.
#
# To freeze a playlist (stop syncing from Spotify):
#   touch /root/Music/inbox/spotdl/<name>.nosync
# The tracks stay in the library; only spotdl sync is skipped.
#
# Example:
# liked-songs   https://open.spotify.com/playlist/37i9dQZF1DXcBWIGoYBM5M
