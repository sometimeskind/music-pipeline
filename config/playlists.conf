# Playlist registry — one entry per line.
# Format: <name> <spotify-url> [nosync]
#   name        slug used as the .spotdl filename, beets source tag, and .m3u filename.
#               Use lowercase letters, numbers, and hyphens only.
#   spotify-url full Spotify playlist URL (not a secret — safe to commit)
#   nosync      optional flag: if present, music-provision creates a .nosync sentinel
#               on the PVC and music-ingest skips spotdl sync for this playlist.
#               Remove the flag and re-run music-provision to unfreeze.
#
# music-provision is idempotent: it creates .spotdl files that don't exist yet,
# and reconciles .nosync files to match this config.
#
# Example:
# liked-songs   https://open.spotify.com/playlist/37i9dQZF1DXcBWIGoYBM5M
# archived-mix  https://open.spotify.com/playlist/37i9dQZF1DXd9rLJfaAKCk  nosync
