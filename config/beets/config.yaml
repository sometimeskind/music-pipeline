# Beets configuration for music-pipeline container.
# Paths use absolute container paths (not ~/); volumes are mounted at these locations.
directory: /root/Music/library
library: /root/.config/beets/library.db

ui:
  color: yes

import:
  quiet: yes
  move: yes
  log: /root/.config/beets/import.log
  duplicate_action: remove

match:
  # Distance threshold: lower = stricter (0 = perfect match).
  # 0.05 accepts only very close MusicBrainz matches automatically.
  # Raise to 0.10 if too many valid tracks land in quarantine.
  strong_rec_thresh: 0.05
  # Allow spotdl downloads (one track at a time from multi-track albums) to
  # still receive a strong recommendation despite missing album tracks, so
  # quiet-mode auto-import accepts them.
  max_rec:
    missing_tracks: strong

paths:
  default: $albumartist/$album/$track - $title
  singleton: $albumartist/$album/$track - $title
  comp: Various Artists/$album/$track - $title

pluginpath:
  - /app/pipeline

plugins: chroma fromfilename fetchart embedart scrub duplicates music_pipeline

fetchart:
  auto: yes

embedart:
  auto: yes

scrub:
  auto: yes
