services:
  pipeline:
    image: ghcr.io/sometimeskind/music-pipeline:latest
    container_name: music-pipeline
    restart: unless-stopped
    volumes:
      # Music data: inbox, library, quarantine, playlists
      - music-data:/root/Music
      # Beets database and import log (SQLite — back this up)
      - beets-data:/root/.config/beets
      # Beets config (from this repo)
      - ./config/beets/config.yaml:/root/.config/beets/config.yaml:ro
      # spotdl config (from this repo)
      - ./config/spotdl/config.json:/root/.config/spotdl/config.json:ro
      # Playlist registry (from this repo; k8s: mount as ConfigMap)
      - ./config/playlists.conf:/root/.config/music-pipeline/playlists.conf:ro
      # YouTube Premium cookies — NOT committed; export from browser and place here
      # See README for export instructions. Expires periodically.
      - ./cookies.txt:/root/.config/spotdl/cookies.txt:ro
    environment:
      # Inject Spotify credentials at runtime via: op run --env-file=.env.tpl -- docker compose up
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      # Cron schedules: fast local scan and daily network sync
      - SCAN_CRON_SCHEDULE=${SCAN_CRON_SCHEDULE:-*/5 * * * *}
      - SYNC_CRON_SCHEDULE=${SYNC_CRON_SCHEDULE:-0 3 * * *}
      # Optional: random sleep up to N seconds before sync (reduces thundering herd in k8s)
      - SYNC_JITTER_SECONDS=${SYNC_JITTER_SECONDS:-0}
      # Optional: Prometheus Pushgateway URL for job metrics
      - PUSHGATEWAY_URL=${PUSHGATEWAY_URL:-}
      # Optional: trigger Navidrome library rescan after each scan
      # NAVIDROME_URL: base URL, e.g. http://navidrome:4533
      # NAVIDROME_API_KEY: credentials as user:password
      - NAVIDROME_URL=${NAVIDROME_URL:-}
      - NAVIDROME_API_KEY=${NAVIDROME_API_KEY:-}

volumes:
  music-data:
  beets-data:
