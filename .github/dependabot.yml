version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    ignore:
      # beets does not support Python 3.14 yet — unblock when it does
      - dependency-name: python
        versions: [">=3.14"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
